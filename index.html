<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Insighteahc US Tech Alpha — 스코어링 대시보드</title>
<style>
  :root{
    --ink:#1b2735; --ink-soft:#5d6b7a; --line:#e3e9ef; --line-d:#cdd8e3;
    --bg:#f4f7fa; --panel:#ffffff; --accent:#2f5d86; --accent-d:#1f3f5c; --tint:#eef3f8;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo",
    "Noto Sans KR","Malgun Gothic",sans-serif;
    background:var(--bg); color:var(--ink); font-size:14px; line-height:1.5;
    -webkit-text-size-adjust:100%;}
  .wrap{max-width:1180px; margin:0 auto; padding:20px 16px 60px;}
  .num{font-variant-numeric:tabular-nums; font-feature-settings:"tnum";}

  header{margin-bottom:18px;}
  h1{font-size:21px; margin:0 0 2px; letter-spacing:-.01em;}
  .sub{color:var(--ink-soft); font-size:13px;}

  .freshline{display:flex; align-items:center; gap:9px; margin-top:10px;
    font-size:12px; color:var(--ink-soft); flex-wrap:wrap;}
  .refreshbtn{font-size:12px; padding:5px 12px; border:1px solid var(--line-d);
    border-radius:8px; background:var(--panel); color:var(--accent); cursor:pointer;
    font-family:inherit; font-weight:600;}
  .refreshbtn:hover{background:var(--tint);}
  .refreshbtn:disabled{opacity:.6; cursor:default;}
  .fdot{display:inline-block; width:9px; height:9px; border-radius:50%; vertical-align:middle;}
  .fresh-g{background:#1f9d4d;} .fresh-y{background:#e0a32e;} .fresh-r{background:#cf3a35;}

  .stats{display:flex; flex-wrap:wrap; gap:10px; margin-top:14px;}
  .stat{background:var(--panel); border:1px solid var(--line); border-radius:10px;
    padding:10px 14px; min-width:120px; flex:1;}
  .stat .top{display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; gap:8px;}
  .stat .k{font-size:11px; color:var(--ink-soft);}
  .stat .v{font-size:18px; font-weight:600; color:var(--accent-d);}
  .stat .v small{font-size:12px; font-weight:500; color:var(--ink-soft);}
  .cardtag{font-size:10px; padding:1px 7px; border-radius:5px; display:inline-flex;
    align-items:center; gap:4px; white-space:nowrap;}
  .cardtag.fixed{background:#eaeef3; color:#5d6b7a;}
  .cardtag.live{background:#eef6f0; color:#1f7d43;}

  .card{background:var(--panel); border:1px solid var(--line); border-radius:12px;
    padding:16px; margin-top:16px;}
  .card h2{font-size:13px; margin:0 0 12px; color:var(--ink); font-weight:600;}
  .sectorbars{display:flex; flex-direction:column; gap:7px;}
  .sbar{display:grid; grid-template-columns:130px 1fr 96px; align-items:center; gap:10px;}
  .sbar .nm{font-size:12px; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .sbar .track{background:var(--tint); border-radius:6px; height:20px; overflow:hidden;}
  .sbar .fill{display:block; height:100%; border-radius:6px;}
  .sbar .mt{font-size:11px; color:var(--ink-soft); text-align:right; white-space:nowrap;}

  .controls{display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-top:16px;}
  .controls input[type=search], .controls select{font-size:13px; padding:7px 10px;
    border:1px solid var(--line-d); border-radius:8px; background:var(--panel);
    color:var(--ink); font-family:inherit;}
  .controls input[type=search]{min-width:160px;}
  .riskbtns{display:flex; gap:4px; flex-wrap:wrap;}
  .rb{font-size:12px; padding:5px 9px; border:1px solid var(--line-d); border-radius:7px;
    background:var(--panel); cursor:pointer; color:var(--ink-soft); user-select:none;}
  .rb.active{color:#fff; border-color:transparent;}
  .toggle{display:flex; align-items:center; gap:6px; font-size:12px; color:var(--ink-soft);
    cursor:pointer; user-select:none;}
  .toggle input{accent-color:var(--accent);}
  .count{margin-left:auto; font-size:12px; color:var(--ink-soft);}

  .tablecard{background:var(--panel); border:1px solid var(--line); border-radius:12px;
    margin-top:14px; overflow:hidden;}
  .scroll{overflow-x:auto;}
  table{border-collapse:collapse; width:100%; min-width:680px;}
  thead th{position:sticky; top:0; background:#f7fafc; z-index:2; font-size:11px;
    color:var(--ink-soft); font-weight:600; text-align:right; padding:10px 12px;
    border-bottom:1px solid var(--line-d); cursor:pointer; white-space:nowrap;}
  thead th.l{text-align:left;} thead th.c{text-align:center;}
  thead th .ar{color:var(--accent); font-size:9px; margin-left:2px;}
  thead th .hdot{width:7px; height:7px; margin-left:4px;}
  tbody td{padding:9px 12px; border-bottom:1px solid var(--line); text-align:right; white-space:nowrap;}
  tbody td.l{text-align:left;} tbody td.c{text-align:center;}
  tbody tr.row{cursor:pointer;}
  tbody tr.row:hover{background:#f9fbfd;}
  .tick{font-weight:600; color:var(--ink);}
  .nm2{font-size:11px; color:var(--ink-soft); margin-top:1px; max-width:160px;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .rk{display:inline-block; width:22px; height:22px; line-height:22px; border-radius:6px;
    color:#fff; font-size:11px; font-weight:700; text-align:center;}
  .scorecell{font-weight:700; border-radius:6px; padding:3px 8px; color:#11261a;
    display:inline-block; min-width:42px; text-align:center;}
  .star{color:#e8a93a; font-size:13px;}
  .src{font-size:10px; color:var(--ink-soft);}
  .up{color:#1b8f4a;} .down{color:#cc3a35;}
  .caret{color:var(--ink-soft); font-size:10px; transition:transform .15s;}
  tr.open .caret{transform:rotate(90deg);}

  tr.detail td{padding:0; border-bottom:1px solid var(--line); background:#fbfdff;}
  .panel{padding:14px 16px; display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:10px 22px;}
  .qline{display:grid; grid-template-columns:96px 1fr 30px; align-items:center; gap:8px;}
  .qline .ql{font-size:11px; color:var(--ink-soft); white-space:nowrap;}
  .qline .qtrack{background:var(--tint); border-radius:5px; height:10px; overflow:hidden;}
  .qline .qfill{display:block; height:100%; border-radius:5px;}
  .qline .qv{font-size:11px; text-align:right; color:var(--ink); font-weight:600;}
  .qline .qv.na{color:#b3bcc6; font-weight:400;}
  .pflag{grid-column:1/-1; font-size:11px; color:#b06a1e; margin-top:2px;}

  .elim{margin-top:14px; font-size:12px; color:var(--ink-soft);}
  .elim h2{font-size:13px; color:var(--ink); margin:0 0 8px;}
  .elim .e{display:inline-block; background:var(--panel); border:1px solid var(--line);
    border-radius:7px; padding:4px 9px; margin:0 6px 6px 0;}
  .elim .e b{color:var(--ink);}

  footer{margin-top:22px; font-size:11px; color:var(--ink-soft); line-height:1.6;}
  .legend span{margin-right:14px; white-space:nowrap;}
  .dot{display:inline-block; width:9px; height:9px; border-radius:2px; vertical-align:middle; margin-right:3px;}

  .toast{position:fixed; left:50%; bottom:24px; transform:translateX(-50%);
    background:#1b2735; color:#fff; padding:9px 16px; border-radius:8px; font-size:13px;
    opacity:0; transition:opacity .25s; pointer-events:none; z-index:99;}
  .toast.show{opacity:.96;}
</style>

function scoreColor(v){
  if(v===null||v===undefined) return "#eef1f4";
  v = Math.max(0,Math.min(100,v));
  let r,g,b;
  if(v<50){ const t=v/50; r=211+(245-211)*t; g=58+(180-58)*t; b=53+(57-53)*t; }
  else{ const t=(v-50)/50; r=245+(27-245)*t; g=180+(158-180)*t; b=57+(74-57)*t; }
  return `rgb(${r|0},${g|0},${b|0})`;
}
function scoreText(v){ return (v===null||v===undefined)?"#b3bcc6":(v<55?"#fff":"#11261a"); }
function fmt(v,d=1){ return (v===null||v===undefined)?"–":Number(v).toFixed(d); }
function pct(v,d=1){ return (v===null||v===undefined)?"–":(v*100).toFixed(d)+"%"; }

// ---------- 신선도 ----------
function ageInfo(){
  let t = META.fetched_at ? Date.parse(META.fetched_at) : NaN;
  if(isNaN(t)) return {cls:"fresh-y", rel:"시각 불명", abs:"—"};
  const h = (Date.now()-t)/3.6e6;
  let cls, rel;
  if(h < 24){ cls="fresh-g"; rel = h<1 ? Math.max(1,Math.round(h*60))+"분 전" : Math.round(h)+"시간 전"; }
  else if(h < 24*7){ cls="fresh-y"; rel = Math.round(h/24)+"일 전"; }
  else { cls="fresh-r"; rel = Math.round(h/24)+"일 전 · 오래됨"; }
  const d=new Date(t), p=n=>String(n).padStart(2,"0");
  const abs=`${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
  return {cls, rel, abs};
}
function renderFreshness(){
  const a=ageInfo();
  document.getElementById("freshDot").className = "fdot "+a.cls;
  document.getElementById("freshText").innerHTML = `데이터 기준 <b>${a.abs}</b> · ${a.rel}`;
}

function renderStats(){
  const a=ageInfo();
  const liveTag = `<span class="cardtag live"><span class="fdot ${a.cls}"></span>변동</span>`;
  const fixedTag = `<span class="cardtag fixed">고정</span>`;
  const cards=[
    {k:"앵커 PER", v:fmt(META.anchor_pe,1)+"<small>x</small>", tag:liveTag},
    {k:"미국채 10년", v:fmt(META.treasury,3)+"<small>%</small>", tag:liveTag},
    {k:"평가 종목", v:META.n_live+"<small> 종목</small>", tag:""},
    {k:"Top10 후보", v:META.n_top10+"<small> 종목</small>", tag:""},
    {k:"세율", v:(META.tax_rate*100).toFixed(0)+"<small>%</small>", tag:fixedTag},
  ];
  document.getElementById("stats").innerHTML = cards.map(c=>
    `<div class="stat"><div class="top"><span class="k">${c.k}</span>${c.tag}</div>`+
    `<div class="v num">${c.v}</div></div>`).join("");
}

// ---------- sector chart ----------
function renderSectorChart(){
  const by={};
  live.forEach(d=>{
    const k=d.sector||"기타";
    if(!by[k]) by[k]={n:0,sum:0,cnt:0};
    by[k].n++;
    if(d.composite!==null&&d.composite!==undefined){ by[k].sum+=d.composite; by[k].cnt++; }
  });
  let rows=Object.keys(by).map(k=>({sector:k,n:by[k].n,avg:by[k].cnt?by[k].sum/by[k].cnt:null}));
  const mode=state.sectorMode;
  if(mode==="score") rows.sort((a,b)=>(b.avg||-1)-(a.avg||-1));
  else rows.sort((a,b)=>b.n-a.n);
  const maxN=Math.max(1,...rows.map(r=>r.n));
  document.getElementById("sectorbars").innerHTML = rows.map(r=>{
    const w = mode==="score" ? (r.avg||0) : (r.n/maxN*100);
    const col = mode==="score" ? scoreColor(r.avg) : "#5b86b0";
    const meta = mode==="score" ? `${r.n}종목 · 평균 ${r.avg!==null?r.avg.toFixed(0):"–"}점` : `${r.n}종목`;
    return `<div class="sbar"><div class="nm" title="${r.sector}">${r.sector}</div>`+
      `<div class="track"><div class="fill" style="width:${w}%;background:${col}"></div></div>`+
      `<div class="mt num">${meta}</div></div>`;
  }).join("");
}

function populateSectorOptions(){

  const cur=sel.value;
  const secs=[...new Set(live.map(d=>d.sector))].sort();
  sel.innerHTML='<option value="">전체 섹터</option>'+secs.map(s=>`<option value="${s}">${s}</option>`).join("");
  if(secs.includes(cur)) sel.value=cur; else state.sector="";
}
function setupControls(){
  document.getElementById("sectorSel").onchange=e=>{ state.sector=e.target.value; render(); };
  const rb=document.getElementById("riskbtns");
  let html=`<div class="rb active" data-r="all">전체</div>`;
  for(let g=0; g<=5; g++) html+=`<div class="rb" data-r="${g}">${g}</div>`;
  rb.innerHTML=html;
  rb.querySelectorAll(".rb").forEach(b=>{
    b.onclick=()=>{
      rb.querySelectorAll(".rb").forEach(x=>{x.classList.remove("active");x.style.background="";x.style.color="";});
      b.classList.add("active");
      const r=b.dataset.r;
      if(r==="all"){ state.risk=null; }
      else{ state.risk=+r; b.style.background=RISK_COL[+r]; b.style.color="#fff"; }
      render();
    };
  });
  document.getElementById("search").oninput=e=>{ state.search=e.target.value.toLowerCase(); render(); };
  document.getElementById("top10only").onchange=e=>{ state.top10=e.target.checked; render(); };
  document.getElementById("showElim").onchange=e=>{ state.showElim=e.target.checked; renderElim(); };
  document.getElementById("sectorMode").onclick=()=>{
    state.sectorMode = state.sectorMode==="score"?"count":"score";
    document.getElementById("sectorMode").textContent = state.sectorMode==="score"?"[평균 점수 ▾]":"[종목 수 ▾]";

    const ar = state.sort.col===c.k ? `<span class="ar">${state.sort.dir>0?'▲':'▼'}</span>` : "";
    const dot = c.live ? `<span class="fdot ${a.cls} hdot"></span>` : "";
    return `<th class="${c.cls||''}" data-k="${c.k}">${c.t}${dot}${ar}</th>`;
  }).join("")+`<th></th>`;
  document.querySelectorAll("thead th[data-k]").forEach(th=>{
    th.onclick=()=>{
      const k=th.dataset.k;
      if(state.sort.col===k) state.sort.dir*=-1;
      else { state.sort.col=k; state.sort.dir=(k==="symbol")?1:-1; }
      render();
    };
  });
}
function filtered(){
  let rows=live.slice();
  if(state.sector) rows=rows.filter(d=>d.sector===state.sector);
  if(state.risk!==null) rows=rows.filter(d=>d.risk===state.risk);
  if(state.top10) rows=rows.filter(d=>d.top10);
  if(state.search){ const q=state.search; rows=rows.filter(d=>d.symbol.toLowerCase().includes(q)||d.name.toLowerCase().includes(q)); }
  const c=state.sort.col, dir=state.sort.dir;
  rows.sort((a,b)=>{
    let va=a[c], vb=b[c];
    if(c==="symbol") return dir*String(va).localeCompare(String(vb));
    if(va===null||va===undefined) va=-Infinity;
    if(vb===null||vb===undefined) vb=-Infinity;
    return dir*(va-vb);
  });
  return rows;
}
function srcMark(d){
  if(d.risk_source==="manual") return '<span class="src">*</span>';
  if(d.risk_source==="auto-suggest") return '<span class="src">?</span>';
  return "";
}
function renderTable(){
  const rows=filtered();
  document.getElementById("count").textContent = `${rows.length} 종목 표시`;
  const tb=document.getElementById("tbody"); tb.innerHTML="";
  rows.forEach(d=>{
    const tr=document.createElement("tr"); tr.className="row"; tr.dataset.sym=d.symbol;
    tr.innerHTML = COLS.map(c=>{
      if(c.special==="score"){ const bg=scoreColor(d.composite),col=scoreText(d.composite);
        return `<td class="c"><span class="scorecell num" style="background:${bg};color:${col}">${d.composite!==null?d.composite.toFixed(0):'–'}</span></td>`; }
      if(c.special==="risk"){ const g=d.risk; const bg=(g!==null&&g!==undefined)?RISK_COL[g]:"#aaa";
        return `<td class="c"><span class="rk num" style="background:${bg}" title="${d.risk_label}">${g}</span>${srcMark(d)}</td>`; }
      if(c.k==="symbol") return `<td class="l"><span class="tick">${d.symbol}</span><div class="nm2">${d.name}</div></td>`;
      if(c.k==="rank") return `<td class="c num">${d.rank||''}</td>`;
      const val=c.fmt?c.fmt(d):d[c.k];
      return `<td class="${c.cls||''} num">${val}</td>`;
    }).join("") + `<td class="c"><span class="caret">▶</span></td>`;
    tr.onclick=()=>toggleRow(tr,d);
    tb.appendChild(tr);
  });
}
function toggleRow(tr,d){
  const next=tr.nextSibling;
  if(next&&next.classList&&next.classList.contains("detail")){ next.remove(); tr.classList.remove("open"); return; }
  document.querySelectorAll("tr.detail").forEach(x=>x.remove());
  document.querySelectorAll("tr.open").forEach(x=>x.classList.remove("open"));
  tr.classList.add("open");
  const dt=document.createElement("tr"); dt.className="detail";
  const td=document.createElement("td"); td.colSpan=COLS.length+1;
  let qs=QLABELS.map(q=>{
    const v=d.scores[q.key], w=(v===null||v===undefined)?0:v, col=scoreColor(v);
    const vtxt=(v===null||v===undefined)?'<span class="qv na">n/a</span>':`<span class="qv num">${v.toFixed(0)}</span>`;
    return `<div class="qline"><span class="ql">${q.label}</span><span class="qtrack"><span class="qfill" style="width:${w}%;background:${col}"></span></span>${vtxt}</div>`;
  }).join("");
  let pf=(d.penalties&&d.penalties.length)?`<div class="pflag">감점: ${d.penalties.join(" · ")} (Risk ${d.risk_base}→${d.risk})</div>`:"";
  td.innerHTML=`<div class="panel">${qs}${pf}</div>`;
  dt.appendChild(td); tr.parentNode.insertBefore(dt,tr.nextSibling);
}
function renderElim(){
  const box=document.getElementById("elimBox");
  if(!state.showElim||elim.length===0){ box.innerHTML=""; return; }
  box.innerHTML=`<h2>탈락 종목 (${elim.length})</h2>`+elim.map(d=>`<span class="e"><b>${d.symbol}</b> · ${d.reason}</span>`).join("");
}
function renderLegend(){
  let r=RISK_COL.map((c,g)=>`<span><span class="dot" style="background:${c}"></span>${g} ${RISKLABELS[g]}</span>`).join("");
  document.getElementById("legend").innerHTML="Risk: "+r;
}

function render(){ renderHead(); renderTable(); }

// ---------- 데이터 적용 / 업데이트 ----------
function recompute(){ live=DATA.filter(d=>!d.eliminated); elim=DATA.filter(d=>d.eliminated); }
function renderAll(){ renderStats(); renderFreshness(); populateSectorOptions(); renderSectorChart(); render(); renderElim(); }
function setData(stocks, meta){ DATA=stocks; META=meta; recompute(); renderAll(); }

function toast(msg){
  const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove("show"),2200);
}
async function doRefresh(){
  const btn=document.getElementById("refreshBtn");
  btn.disabled=true; btn.textContent="⟳ 불러오는 중…";
  try{
    const r=await fetch("./insighteahc_data.json?_="+Date.now(), {cache:"no-store"});
    if(r.ok){
      const p=await r.json();
      if(p&&p.stocks){
        if(p.q_labels) QLABELS=p.q_labels;
        if(p.risk_labels) RISKLABELS=p.risk_labels;
        setData(p.stocks, p.meta); renderLegend();
        toast("최신 데이터를 불러왔습니다");
        btn.disabled=false; btn.textContent="↻ 업데이트";
        return;
      }
    }
  }catch(e){}
  toast("페이지를 새로고침합니다…");
  setTimeout(()=>{ location.href=location.origin+location.pathname+"?t="+Date.now(); },600);
}

// ---------- init ----------
setupControls();
renderLegend();
recompute();
renderAll();
</script>
</body>
